erver.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=citizen-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://citizen-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/citizens/**,/api/audit/**,/api/documents/**
